<!DOCTYPE html>
<html>
<head>
    <title>Create Exam</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h2>Create Exam</h2>

    <form>
        <input type="text" placeholder="Exam Title"><br><br>
        <input type="number" placeholder="Duration (minutes)"><br><br>

        <h3>Add Question</h3>
        <textarea placeholder="Question"></textarea><br><br>

        <input type="text" placeholder="Option A"><br>
        <input type="text" placeholder="Option B"><br>
        <input type="text" placeholder="Option C"><br>
        <input type="text" placeholder="Option D"><br><br>

        <button>Add Question</button><br><br>
        <button type="submit">Create Exam</button>
    </form>
</body>
</html>
