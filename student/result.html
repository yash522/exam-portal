<!DOCTYPE html>
<html>
<head>
    <title>Exam Result</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body class="result-page">

<div class="wrapper">
    <div class="container result-box">

        <h2>Exam Result</h2>

        <h1 id="score"></h1>

        <div id="details"></div>

    </div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("resultData"));

const scoreElement = document.getElementById("score");
const container = document.getElementById("details");

if (!data) {
    scoreElement.innerText = "Error: No result found";
} else {

   
    scoreElement.innerText = "Score: " + data.score;

    
    container.innerHTML = "";

    
    data.results.forEach((r, index) => {

        const div = document.createElement("div");
        div.classList.add("result-item");

        div.innerHTML = `
            <p><b>Q${index + 1}: ${r.question}</b></p>

            <p>Your Answer: ${r.your_answer || "Not Attempted"}</p>

            <p>Correct Answer: ${r.correct_answer}</p>

            <p class="${r.is_correct ? 'correct' : 'wrong'}">
                ${r.is_correct ? "✔ Correct" : "✘ Wrong"}
            </p>

            <p>Time Spent: ${r.time_spent || 0} sec</p>
        `;

        container.appendChild(div);
    });
}
</script>

</body>
</html>
