<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="exam-page">
    <div class="wrapper">
    <div class="container">
    


<h2>Exam</h2>

<h3 id="timer">Time Left: --:--</h3>

<form id="examForm">
    <div id="questions"></div>
    <button type="button" onclick="submitExam()">Submit</button>
</form>

    </div>
    </div>

<script>
// ----------------------
// TIME TRACKING
// ----------------------
let questionStartTime = Date.now();
let timeSpent = {};

// ----------------------
// GET EXAM ID
// ----------------------
const examId = localStorage.getItem("examId");

if (!examId) {
    alert("No exam selected!");
    window.location.href = "dashboard.html";
}

// ----------------------
// TIMER SETUP
// ----------------------
let duration = 0;
let timerInterval;

fetch("http://localhost:5000/exams")
.then(res => res.json())
.then(data => {
    const exam = data.find(e => e.id == examId);

    if (exam) {
        duration = exam.duration * 60;
        startTimer();
    }
});

function startTimer() {
    const timerDisplay = document.getElementById("timer");

    timerInterval = setInterval(() => {
        let minutes = Math.floor(duration / 60);
        let seconds = duration % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        timerDisplay.innerText = `Time Left: ${minutes}:${seconds}`;

        duration--;

        if (duration < 0) {
            clearInterval(timerInterval);
            alert("Time's up! Submitting exam...");
            submitExam();
        }
    }, 1000);
}

// ----------------------
// LOAD QUESTIONS (FIXED)
// ----------------------
fetch(`http://localhost:5000/questions/${examId}`)
.then(res => res.json())
.then(data => {
    const container = document.getElementById("questions");
    container.innerHTML = "";

    if (!data || data.length === 0) {
        container.innerHTML = "No questions found.";
        return;
    }

    data.forEach((q, index) => {
        const div = document.createElement("div");

        div.innerHTML = `
            <p><b>Q${index+1}: ${q.question_text}</b></p>

            <label><input type="radio" name="q${q.id}" value="A"> ${q.option_a || ""}</label><br>
            <label><input type="radio" name="q${q.id}" value="B"> ${q.option_b || ""}</label><br>
            <label><input type="radio" name="q${q.id}" value="C"> ${q.option_c || ""}</label><br>
            <label><input type="radio" name="q${q.id}" value="D"> ${q.option_d || ""}</label>
        `;

        container.appendChild(div);
    });

    // ✅ 🔥 THIS IS THE MISSING PART
    document.querySelectorAll("input[type=radio]").forEach(input => {
        input.addEventListener("change", (e) => {
            const qid = e.target.name.replace("q", "");
            recordTime(qid);
        });
    });
});

// ----------------------
// RECORD TIME FUNCTION
// ----------------------
function recordTime(qid) {
    const now = Date.now();

    if (!timeSpent[qid]) {
        timeSpent[qid] = 0;
    }

    timeSpent[qid] += Math.floor((now - questionStartTime) / 1000);

    questionStartTime = now;
}

// ----------------------
// SUBMIT EXAM (unchanged)
// ----------------------
function submitExam() {
    clearInterval(timerInterval);

    const form = document.getElementById("examForm");
    const answers = [];

    const inputs = form.querySelectorAll("input[type=radio]:checked");

    inputs.forEach(input => {
        const qid = input.name.replace("q", "");

        answers.push({
            question_id: Number(qid),
            selected_option: input.value,
            time_spent: timeSpent[qid] || 0
        });
    });

    fetch("http://localhost:5000/submit", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            student_id: 1,
            exam_id: Number(examId),
            answers: answers
        })
    })
    .then(res => res.json())
    .then(data => {
        localStorage.setItem("resultData", JSON.stringify(data));
        window.location.href = "result.html";
    })
    .catch(err => {
        console.log(err);
        alert("Submission failed!");
    });
}
</script>


</body>
</html>
